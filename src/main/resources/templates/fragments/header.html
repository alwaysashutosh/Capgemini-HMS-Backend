<!-- src/main/resources/templates/fragments/header.html -->
<header th:fragment="header" class="flex justify-between items-center h-16 px-8 bg-white/80 dark:bg-slate-950/80 backdrop-blur-md sticky top-0 z-40 shadow-sm shadow-sky-900/5">
    <div class="flex items-center flex-1 max-w-xl">
        <div class="relative w-full group">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-sky-600 transition-colors">search</span>
            <input class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-sky-500/20 transition-all outline-none" placeholder="Search patients, records, or appointments..." type="text"/>
        </div>
    </div>
    <div class="flex items-center gap-4 ml-8">
        <button class="p-2 text-slate-400 hover:text-sky-700 transition-colors relative">
            <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
            <span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-white"></span>
        </button>
        <button class="p-2 text-slate-400 hover:text-sky-700 transition-colors">
            <span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
        </button>
    </div>
</header>
